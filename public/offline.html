<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | LifeBloom Hub</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #FDFBF7;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #1E3A8A; font-size: 2rem; margin-bottom: 10px; }
    p { color: #64748b; font-size: 1.125rem; max-w-md; line-height: 1.5; }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>You're Offline</h1>
  <p>It seems your internet connection was lost. Don't worry, some of your calculators are available offline, but this page requires a connection.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
